<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MT5 Dashboard</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">
    <span class="brand-mark">MT5</span>
  </div>
  <div class="hdr-active" data-bind="active-setups">
    <span class="active-label">ACTIVE SETUPS</span>
    <span class="active-bell" data-bind="alert-toggle" role="button" tabindex="0"
          title="高確信アラート">🔕</span>
    <span class="active-chips" data-bind="active-chips"><span class="active-empty">no high-conviction signals</span></span>
  </div>
  <div class="hdr-stats">
    <div class="stat"><div class="stat-label">JST</div><div class="stat-val" data-bind="clock">--:--:--</div></div>
    <div class="stat"><div class="stat-label">MT5</div><div class="stat-val"><span class="dot off" data-bind="conn-dot"></span><span data-bind="conn-text">offline</span></div></div>
    <div class="stat"><div class="stat-label">CYCLE</div><div class="stat-val" data-bind="compute">-- ms</div></div>
    <div class="stat"><div class="stat-label">VER</div><div class="stat-val" data-bind="version">0</div></div>
  </div>
</header>

<main class="grid">
  <section class="symbols" data-bind="symbols-grid"></section>
</main>

<aside class="side">
    <div class="card ry-card">
      <div class="card-title"><span class="title-accent">実質金利 米10年</span><span data-bind="ry-status" class="mute">--</span></div>
      <div class="dxy-body" data-bind="realyield"><div class="empty mute">読み込み中…</div></div>
    </div>

    <div class="card dxy-card">
      <div class="card-title"><span class="title-accent">DXY ドル指数</span><span data-bind="dxy-sym" class="mute">--</span></div>
      <div class="dxy-body" data-bind="dxy"><div class="empty mute">読み込み中…</div></div>
    </div>

    <div class="card cot-card">
      <div class="card-title"><span class="title-accent">COT 金先物 投機筋</span><span data-bind="cot-date" class="mute">--</span></div>
      <div class="cot-body" data-bind="cot"><div class="empty mute">読み込み中…</div></div>
    </div>

    <div class="card calendar-card">
      <div class="card-title"><span class="title-accent">Calendar</span><span data-bind="cal-source" class="mute">--</span></div>
      <div class="cal-list" data-bind="calendar"><div class="empty mute">読み込み中…</div></div>
    </div>

  </aside>

<section class="fund" data-bind="fund">
  <div class="fund-kpi" data-bind="fund-kpi"></div>
  <div class="fund-main">
    <div class="fund-tabs" data-bind="fund-tabs">
      <button class="pill on" data-fundtab="positions">現ポジション</button>
      <button class="pill" data-fundtab="money">資金管理</button>
      <button class="pill" data-fundtab="history">履歴</button>
    </div>
    <div class="fund-body" data-bind="fund-body"></div>
  </div>
</section>

<!-- Discretionary order confirmation (mandatory before any live order). -->
<div id="order-confirm" class="order-confirm" hidden>
  <div class="oc-box">
    <div class="oc-title" data-bind="oc-title">注文確認</div>
    <div class="oc-detail" data-bind="oc-detail"></div>
    <div class="oc-result" data-bind="oc-result"></div>
    <div class="oc-actions">
      <button class="oc-cancel" type="button">キャンセル</button>
      <button class="oc-go" type="button">確定して発注</button>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
